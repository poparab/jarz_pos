name: Backend Tests

on:
  workflow_dispatch: {}
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "jarz_pos/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "jarz_pos/**"
      - ".github/workflows/backend-tests.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Logic gate.
  # Runs the full jarz_pos suite (mock/unittest + DocType create-and-verify
  # mock/unittest modules) against the existing backend container's `frontend`
  # site with --skip-before-tests. ERPNext v16's test bootstrap (BootStrapTestData
  # at import of erpnext.tests.utils) collides with populated master data, and a
  # fresh vanilla site can't install jarz_pos (needs a configured company), so the
  # full `--app` run is not viable on any site; the curated module list avoids both
  # problems and is non-destructive. GL/accounting coverage is provided by Job 2.
  # ---------------------------------------------------------------------------
  logic-tests:
    name: Logic tests (mock/unittest suite)
    runs-on: [self-hosted, staging-docker]

    steps:
      - uses: actions/checkout@v4

      - name: Resolve backend container
        id: backend-container
        shell: bash
        run: |
          container_name="$(docker ps --format '{{.Names}}' | grep -E '^erp[-_]backend[-_][0-9]+$' | head -1)"
          if [ -z "$container_name" ]; then
            echo "Could not find an ERPNext backend container. Expected erp-backend-1 or erp_backend_1."
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            exit 1
          fi
          echo "name=$container_name" >> "$GITHUB_OUTPUT"

      # ── Sync branch code into the app ──────────────────────────────────────
      # NEVER `docker cp .` here. /home/frappe/frappe-bench/apps IS the live
      # `erp_apps` volume, and `docker cp .` copies the runner's ENTIRE checkout —
      # `.git` included — over the live repo. That transplanted CI's git state onto
      # staging: a depth-1 shallow clone whose HEAD was the tip of main, plus an
      # actions/checkout `http.…extraheader` AUTHORIZATION token left in the volume.
      #
      # The fallout (found 2026-07-15) was a systemic false-green. deploy_backend.ps1
      # gates every step on `HeadBefore -ne RemoteHead`; CI had already moved on-disk
      # HEAD to the deploy's target commit, so the deploy computed DEPLOY_REQUIRED=false
      # and skipped pip/migrate/cache-clear/restart while reporting success. gunicorn
      # runs with --preload, so the code only loads at master start: the new code sat
      # on disk and never ran. Staging served code two commits stale, green all the way.
      #
      # `git archive HEAD` exports exactly the tracked tree at this commit — no `.git`,
      # no untracked junk, no token — so the live repo's git state is left untouched
      # and the deploy's change detection stays meaningful.
      #
      # Extracting via `docker exec` (not `docker cp`) also drops CI's root privilege:
      # `docker cp` runs through the daemon as root and bypasses file permissions
      # entirely, which is how it stamped the runner's uid 1001 across the volume.
      # `docker exec` runs as `frappe` (uid 1000 = host `ubuntu`), so CI can only write
      # what it legitimately owns. This REQUIRES the volume to be owned by uid 1000 —
      # if this step dies with "Cannot open: Permission denied", the app dir is still
      # uid 1001 and needs `sudo chown -R ubuntu:ubuntu` once (see the remediation text
      # in deploy_backend.ps1's Assert-AppRepoIntegrity).
      #
      # Known limitation, unchanged from the old `docker cp`: tar adds and overwrites
      # but never deletes, so a file the deployed commit has and this branch removed
      # stays on disk for the test run. The restore below puts tracked files back.
      - name: Sync branch code into the app (so tests run against this checkout)
        env:
          CONTAINER: ${{ steps.backend-container.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar HEAD \
            | docker exec -i "${CONTAINER}" tar -xf - -C /home/frappe/frappe-bench/apps/jarz_pos

      - name: Run mock/unittest logic suite (safe, non-destructive vs frontend)
        env:
          CONTAINER: ${{ steps.backend-container.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          # Why an explicit module list rather than `--app jarz_pos`:
          #   * ERPNext v16 runs BootStrapTestData() at import of erpnext.tests.utils
          #     (pulled in by any FrappeTestCase), which collides with the populated
          #     `frontend` master data ("Duplicate 'Standard Buying'", "overlapping
          #     Fiscal Year") and fails the run during test collection.
          #   * A fresh vanilla site can't be used either — jarz_pos's install requires a
          #     pre-configured company (abbr "J" + freight/courier/cash accounts), so
          #     `bench new-site --install-app jarz_pos` fails.
          # So we run the pure mock/unittest modules (which never import
          # erpnext.tests.utils) and pass --skip-before-tests so ERPNext's destructive
          # before_tests hook (delete from `tabItem Price` + commit) never runs against
          # the live clone. Verified locally: Item Price count is unchanged by this run.
          MODULES=(
            test_commercial_policy
            test_pricing_manager_gate
            test_settlement_accounting
            test_settlement_strategies
            test_pickup_flow
            test_invoice_creation_accounting
            test_sales_partner_flow
            test_kanban_settlement
            test_invoice_cases_integration
            test_b2b_permission_gating
            test_b2b_customer_search_filter
            test_b2b_lead_contact_guard
            test_b2b_crm_access
            test_b2b_reorder_forecast
            test_b2b_pos_bridge_delivery
            test_leads_api
          )
          rc=0
          for m in "${MODULES[@]}"; do
            echo "::group::${m}"
            docker exec "${CONTAINER}" bench --site frontend run-tests \
              --app jarz_pos --module "jarz_pos.tests.${m}" --skip-before-tests --failfast || rc=1
            echo "::endgroup::"
          done
          exit $rc
        timeout-minutes: 20

      # Undo the branch-code sync so staging's worktree matches its deployed commit
      # again (the test run only needed the branch code transiently).
      #
      # This step used to be a guaranteed no-op: the `docker cp .` above had already
      # overwritten `.git`, so `git checkout -- .` restored the worktree to the CI
      # commit — i.e. to the code it had just copied in — and the deployed commit it
      # meant to bring back no longer existed in the (shallow) repo. Now that the sync
      # leaves `.git` alone, HEAD is still the deployed commit and this genuinely
      # reverts.
      #
      # It also no longer swallows errors with `|| true`. Failing loudly matters: a
      # silent restore failure leaves branch code on the live volume, which is exactly
      # what deploy_backend.ps1's integrity guard now refuses to deploy over.
      - name: Restore deployed app code on the runner host
        if: ${{ always() }}
        env:
          CONTAINER: ${{ steps.backend-container.outputs.name }}
          APP_DIR: /home/frappe/frappe-bench/apps/jarz_pos
        shell: bash
        run: |
          set -euo pipefail
          # Tracked files only. Deliberately NOT `git clean` — an untracked directory
          # whose contents are all gitignored (e.g. a dir holding only __pycache__) is
          # hidden by `git status` but still listed by `git clean -nd`, and whether
          # `-d` actually removes it varies by git version. Against a live production
          # clone that ambiguity isn't worth it; `checkout -- .` restores the deployed
          # code, which is the property that matters. Any file the branch adds and the
          # deployed commit lacks is left as an inert untracked file, which is why the
          # deploy guard checks tracked files (-uno) rather than untracked ones.
          docker exec "${CONTAINER}" git -c safe.directory="${APP_DIR}" -C "${APP_DIR}" checkout -- .
          echo "Restored worktree to deployed commit:"
          docker exec "${CONTAINER}" git -c safe.directory="${APP_DIR}" -C "${APP_DIR}" status -sb -uno

  # ---------------------------------------------------------------------------
  # Job 2 — Accounting / GL integrity gate.
  # The GL-verification cases only have coverage against the populated
  # `frontend` production clone, but `bench run-tests` against `frontend` is
  # destructive: ERPNext's `before_tests` hook runs `delete from tabItem Price`
  # and `set_defaults_for_tests()` then commits. So instead we run the SAME
  # hard double-entry invariants as a READ-ONLY audit via `bench execute` —
  # no bootstrap, no mutation, safe against the live clone. Only mathematical
  # invariants (every voucher DR==CR, no negative/dual-sided lines, JEs
  # balanced) gate the build; operational-state checks live in
  # `run_monitoring` for a scheduled audit, not the commit gate.
  #
  # Serialized after logic-tests (same shared bench) but runs even if that job
  # failed, so the two gates report independently.
  # ---------------------------------------------------------------------------
  gl-audit:
    name: GL accounting integrity (read-only vs frontend)
    runs-on: [self-hosted, staging-docker]
    needs: logic-tests
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve backend container
        id: backend-container
        shell: bash
        run: |
          container_name="$(docker ps --format '{{.Names}}' | grep -E '^erp[-_]backend[-_][0-9]+$' | head -1)"
          if [ -z "$container_name" ]; then
            echo "Could not find an ERPNext backend container. Expected erp-backend-1 or erp_backend_1."
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            exit 1
          fi
          echo "name=$container_name" >> "$GITHUB_OUTPUT"

      # Copy ONLY the audit module — additive, read-only test code. We do NOT
      # overwrite the deployed app on the live `frontend` bench here, and (unlike a
      # bare `docker cp .`) a single-file copy cannot touch the live `.git`.
      - name: Stage the read-only audit module
        run: |
          docker cp ./jarz_pos/tests/gl_audit.py \
            "${{ steps.backend-container.outputs.name }}:/home/frappe/frappe-bench/apps/jarz_pos/jarz_pos/tests/gl_audit.py"

      - name: Run read-only GL integrity audit against frontend
        run: |
          docker exec "${{ steps.backend-container.outputs.name }}" bench \
            --site frontend \
            execute jarz_pos.tests.gl_audit.run
        timeout-minutes: 10

      # The audit module is this branch's copy, not the deployed one. Put the live
      # worktree back the way we found it — otherwise every CI run leaves staging
      # dirty (modified if the file is tracked at the deployed commit, untracked if
      # it isn't), which deploy_backend.ps1's integrity guard now rejects.
      - name: Restore deployed app code on the runner host
        if: ${{ always() }}
        env:
          CONTAINER: ${{ steps.backend-container.outputs.name }}
          APP_DIR: /home/frappe/frappe-bench/apps/jarz_pos
        shell: bash
        run: |
          set -euo pipefail
          # Tracked files only. Deliberately NOT `git clean` — an untracked directory
          # whose contents are all gitignored (e.g. a dir holding only __pycache__) is
          # hidden by `git status` but still listed by `git clean -nd`, and whether
          # `-d` actually removes it varies by git version. Against a live production
          # clone that ambiguity isn't worth it; `checkout -- .` restores the deployed
          # code, which is the property that matters. Any file the branch adds and the
          # deployed commit lacks is left as an inert untracked file, which is why the
          # deploy guard checks tracked files (-uno) rather than untracked ones.
          docker exec "${CONTAINER}" git -c safe.directory="${APP_DIR}" -C "${APP_DIR}" checkout -- .
          echo "Restored worktree to deployed commit:"
          docker exec "${CONTAINER}" git -c safe.directory="${APP_DIR}" -C "${APP_DIR}" status -sb -uno
